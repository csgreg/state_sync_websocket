# Render Blueprint for the Rikiki websocket backend (FREE tier).
# Deploy: Render Dashboard > New > Blueprint > pick this repo.
#
# Free-tier tradeoffs:
#  - No persistent disk: the SQLite file lives on the ephemeral container FS,
#    so room state is lost on every restart / redeploy / cold start.
#  - The service spins down after ~15 min of inactivity; the next request
#    cold-starts in ~50s. An active game (open websocket) keeps it awake.
# For state that survives restarts, switch to plan: starter + a disk (paid).
services:
  - type: web
    name: rikiki-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Lock CORS to the deployed frontend.
      - key: CORS_ORIGIN
        value: https://rikikicounter.vercel.app
